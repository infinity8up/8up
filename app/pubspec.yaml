name: eightup_user_app
description: "Member-facing studio booking app for pass-based studios."
publish_to: 'none'
version: 1.0.3+10

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  crypto: ^3.0.7
  file_picker: ^10.3.2
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.7
  google_sign_in: ^6.3.0
  google_fonts: ^6.2.1
  flutter_local_notifications: ^19.4.1
  image: ^4.5.4
  intl: ^0.20.2
  provider: ^6.1.2
  shared_preferences: ^2.5.0
  sign_in_with_apple: ^6.1.4
  supabase_flutter: ^2.8.4
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/icon.png
    - assets/branding/icon_large.png
    - assets/branding/google_signin_mark.png
    - assets/branding/kakao_sync_mark.png
    - assets/config/runtime.env
